<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    display: flex;
    flex-direction: column;
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background:
        linear-gradient(rgba(244,247,251,0.95), rgba(244,247,251,0.95)),
        url("https://www.transparenttextures.com/patterns/heartbeat.png");
}

header {
    background: linear-gradient(135deg, #0b3c5d, #1e6fa1);
    color: white;
    padding: 25px;
    text-align: center;
    width: 100%;
    box-sizing: border-box;
}

.main {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
}

.box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 400px;
    max-width: 90%;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 12px;
    background: #1e6fa1;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
}
</style>
</head>

<body>

<header>
    <h1>Cardiovascular Disease Detection System</h1>
    <p>Myocardial Infarction | Arrhythmia | History of MI | Normal</p>
</header>

<div class="main">
    <div class="box">

        <h2>Register</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

    </div>
</div>

</body>
</html>
